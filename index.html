<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ブロック・ワールド PC版</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#87ceeb; }
  * { box-sizing:border-box; }
  #c { display:block; width:100%; height:100%; cursor:pointer; }

  #crosshair {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:20px; height:20px; pointer-events:none; z-index:10;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:rgba(255,255,255,0.9); box-shadow:0 0 2px rgba(0,0,0,0.7);
  }
  #crosshair::before { left:9px; top:0; width:2px; height:20px; }
  #crosshair::after { top:9px; left:0; width:20px; height:2px; }

  #hotbar {
    position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
    display:flex; gap:6px; z-index:20; background:rgba(0,0,0,0.28); padding:8px; border-radius:10px;
    border:1px solid rgba(255,255,255,0.15);
  }
  .slot {
    width:48px; height:48px; border-radius:6px; border:2px solid rgba(255,255,255,0.35);
    background-size:cover; position:relative; image-rendering:pixelated;
  }
  .slot.sel { border-color:#fff; box-shadow:0 0 10px rgba(255,255,255,0.9); transform:translateY(-3px); }
  .slot span {
    position:absolute; top:1px; left:3px; font-size:10px; color:#fff; font-family:sans-serif;
    text-shadow:0 1px 2px rgba(0,0,0,0.9);
  }
  .slot em {
    position:absolute; bottom:0; right:2px; font-style:normal; font-size:10px; color:#fff;
    font-family:sans-serif; text-shadow:0 1px 2px rgba(0,0,0,0.9);
  }

  #topBar {
    position:fixed; right:16px; top:14px; z-index:20; display:flex; gap:8px; align-items:center;
    font-family:sans-serif;
  }
  #newWorldBtn, #flyIndicator {
    background:rgba(0,0,0,0.4); color:#fff; border:1px solid rgba(255,255,255,0.35); border-radius:8px;
    padding:8px 12px; font-family:sans-serif; font-size:12px; cursor:pointer;
  }
  #dayIndicator {
    background:rgba(0,0,0,0.4); color:#fff; border:1px solid rgba(255,255,255,0.35); border-radius:8px;
    padding:8px 12px; font-size:16px;
  }

  #hint {
    position:fixed; left:16px; top:14px; z-index:20; color:#fff; font-family:sans-serif; font-size:12px;
    background:rgba(0,0,0,0.32); padding:10px 12px; border-radius:8px; line-height:1.7;
  }
  #hint b { color:#ffe27a; }

  #startOverlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:50;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    color:#fff; font-family:sans-serif; text-align:center; gap:10px;
  }
  #startOverlay h1 { margin:0; font-size:28px; letter-spacing:1px; }
  #startOverlay p { margin:0; font-size:14px; opacity:0.85; max-width:380px; line-height:1.6; }
  #startOverlay .key { background:rgba(255,255,255,0.15); padding:2px 8px; border-radius:4px; }
  #startOverlay.hidden { display:none; }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="crosshair"></div>

  <div id="hint">
    <b>WASD</b> 移動　<b>Space</b> ジャンプ（<b>2連打</b>で飛行）<br>
    <b>Shift</b> ダッシュ／飛行中は降下<br>
    <b>マウス</b> 視点　<b>左クリック</b> 破壊　<b>右クリック</b> 設置<br>
    <b>1〜7</b> または <b>ホイール</b> でブロック選択
  </div>

  <div id="topBar">
    <div id="dayIndicator">☀️</div>
    <button id="newWorldBtn">新しい世界</button>
  </div>

  <div id="hotbar"></div>

  <div id="startOverlay">
    <h1>ブロック・ワールド</h1>
    <p>画面をクリックしてマウスをロックし、プレイを開始してください。<span class="key">Esc</span> でいつでも操作を離せます。</p>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  "use strict";

  // ================= Renderer / Scene =================
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const skyColor = new THREE.Color(0x87ceeb);
  scene.background = skyColor;
  scene.fog = new THREE.Fog(skyColor.getHex(), 24, 80);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 300);
  camera.rotation.order = 'YXZ';

  const ambient = new THREE.AmbientLight(0xffffff, 0.55);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffffff, 0.85);
  sun.position.set(30, 50, 10);
  scene.add(sun);
  const sunTarget = new THREE.Object3D();
  scene.add(sunTarget);
  sun.target = sunTarget;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ================= Procedural textures =================
  function makeTex(draw, size=16){
    const cv = document.createElement('canvas');
    cv.width = cv.height = size;
    const ctx = cv.getContext('2d');
    draw(ctx, size);
    const tex = new THREE.CanvasTexture(cv);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    tex.needsUpdate = true;
    tex.dataUrl = cv.toDataURL();
    return tex;
  }
  function speckle(ctx, s, base, n){
    ctx.fillStyle = base; ctx.fillRect(0,0,s,s);
    for(let i=0;i<n;i++){
      const shade = Math.random() < 0.5 ? 0 : 255;
      ctx.fillStyle = `rgba(${shade},${shade},${shade},${0.05+Math.random()*0.09})`;
      ctx.fillRect(Math.floor(Math.random()*s), Math.floor(Math.random()*s), 1, 1);
    }
  }

  const tex = {
    grassTop: makeTex((ctx,s)=> speckle(ctx,s,'#5fa63c',45)),
    grassSide: makeTex((ctx,s)=>{
      speckle(ctx,s,'#8b5a2b',30);
      ctx.fillStyle = '#5fa63c';
      for(let x=0;x<s;x++){
        const h = 5 + Math.floor(Math.random()*3);
        ctx.fillRect(x,0,1,h);
      }
    }),
    dirt: makeTex((ctx,s)=> speckle(ctx,s,'#8b5a2b',45)),
    stone: makeTex((ctx,s)=>{
      speckle(ctx,s,'#8a8a8a',40);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      for(let i=0;i<6;i++){
        ctx.fillRect(Math.random()*s, Math.random()*s, 2+Math.random()*3, 1+Math.random()*2);
      }
    }),
    sand: makeTex((ctx,s)=> speckle(ctx,s,'#dccd7a',30)),
    woodSide: makeTex((ctx,s)=>{
      ctx.fillStyle = '#6b4423'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      for(let x=1;x<s;x+=3) ctx.fillRect(x,0,1,s);
    }),
    woodTop: makeTex((ctx,s)=>{
      ctx.fillStyle = '#c9a06a'; ctx.fillRect(0,0,s,s);
      ctx.strokeStyle = 'rgba(90,55,25,0.6)';
      for(let r=1;r<s/2;r+=2){ ctx.beginPath(); ctx.arc(s/2,s/2,r,0,Math.PI*2); ctx.stroke(); }
    }),
    leaves: makeTex((ctx,s)=> speckle(ctx,s,'#2e7d32',65)),
    water: makeTex((ctx,s)=> speckle(ctx,s,'#3a7bd5',20)),
  };

  // ================= Block types =================
  const matCache = {};
  function mat(map, opts){
    return new THREE.MeshLambertMaterial(Object.assign({ map }, opts||{}));
  }
  const matGrassTop = mat(tex.grassTop);
  const matGrassSide = mat(tex.grassSide);
  const matDirt = mat(tex.dirt);
  const matStone = mat(tex.stone);
  const matSand = mat(tex.sand);
  const matWoodSide = mat(tex.woodSide);
  const matWoodTop = mat(tex.woodTop);
  const matLeaves = mat(tex.leaves);
  const matWater = mat(tex.water, { transparent:true, opacity:0.75 });

  // BoxGeometry face group order: px, nx, py, ny, pz, nz
  const BLOCK_TYPES = {
    grass:  { icon: tex.grassTop.dataUrl, label:'草',  solid:true,  material: [matGrassSide,matGrassSide,matGrassTop,matDirt,matGrassSide,matGrassSide] },
    dirt:   { icon: tex.dirt.dataUrl,     label:'土',  solid:true,  material: matDirt },
    stone:  { icon: tex.stone.dataUrl,    label:'石',  solid:true,  material: matStone },
    sand:   { icon: tex.sand.dataUrl,     label:'砂',  solid:true,  material: matSand },
    wood:   { icon: tex.woodSide.dataUrl, label:'木材', solid:true,  material: [matWoodSide,matWoodSide,matWoodTop,matWoodTop,matWoodSide,matWoodSide] },
    leaves: { icon: tex.leaves.dataUrl,   label:'葉',  solid:true,  material: matLeaves },
    water:  { icon: tex.water.dataUrl,    label:'水',  solid:false, material: matWater },
  };
  const typeNames = Object.keys(BLOCK_TYPES);
  let selectedIndex = 0;

  // ================= World data =================
  const SIZE = 30;
  const SEA_LEVEL = 3;
  const key = (x,y,z) => x+','+y+','+z;
  let worldData = new Map();

  function terrainHeight(x,z){
    const h = 5 + Math.sin(x*0.22)*2.4 + Math.cos(z*0.22)*2.4 + Math.sin((x+z)*0.09)*1.6;
    return Math.max(0, Math.floor(h));
  }
  function isSolidAt(x,y,z){
    const t = worldData.get(key(Math.floor(x),Math.floor(y),Math.floor(z)));
    return !!t && BLOCK_TYPES[t].solid;
  }
  function typeAt(x,y,z){
    return worldData.get(key(Math.floor(x),Math.floor(y),Math.floor(z))) || null;
  }

  function generateWorld(){
    worldData = new Map();
    for(let x=-SIZE; x<=SIZE; x++){
      for(let z=-SIZE; z<=SIZE; z++){
        const h = terrainHeight(x,z);
        for(let y=0; y<=h; y++){
          let t;
          if(y === h) t = (h <= SEA_LEVEL+1) ? 'sand' : 'grass';
          else if(y >= h-2) t = 'dirt';
          else t = 'stone';
          worldData.set(key(x,y,z), t);
        }
        if(h < SEA_LEVEL){
          for(let y=h+1; y<=SEA_LEVEL; y++) worldData.set(key(x,y,z), 'water');
        }
        if(h >= SEA_LEVEL+2 && Math.random() < 0.01 && Math.abs(x) < SIZE-3 && Math.abs(z) < SIZE-3){
          const trunkH = 3 + Math.floor(Math.random()*3);
          for(let ty=1; ty<=trunkH; ty++) worldData.set(key(x, h+ty, z), 'wood');
          for(let lx=-1; lx<=1; lx++){
            for(let lz=-1; lz<=1; lz++){
              for(let ly=0; ly<=1; ly++){
                if(lx===0 && lz===0 && ly===0) continue;
                if(Math.random() < 0.85) worldData.set(key(x+lx, h+trunkH+ly, z+lz), 'leaves');
              }
            }
          }
          worldData.set(key(x, h+trunkH+2, z), 'leaves');
        }
      }
    }
  }

  // ================= Instanced mesh rendering =================
  const boxGeom = new THREE.BoxGeometry(1,1,1);
  let instancedMeshes = {};

  function rebuildMeshes(){
    for(const t of typeNames){
      if(instancedMeshes[t]){ scene.remove(instancedMeshes[t]); instancedMeshes[t].dispose(); }
    }
    instancedMeshes = {};
    const buckets = {};
    for(const t of typeNames) buckets[t] = [];
    for(const [k,t] of worldData.entries()) buckets[t].push(k);

    const dummy = new THREE.Object3D();
    for(const t of typeNames){
      const list = buckets[t];
      if(list.length === 0) continue;
      const mesh = new THREE.InstancedMesh(boxGeom, BLOCK_TYPES[t].material, list.length);
      for(let i=0;i<list.length;i++){
        const [x,y,z] = list[i].split(',').map(Number);
        dummy.position.set(x+0.5, y+0.5, z+0.5);
        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
      }
      mesh.instanceMatrix.needsUpdate = true;
      if(t === 'water') mesh.renderOrder = 1;
      scene.add(mesh);
      instancedMeshes[t] = mesh;
    }
  }

  const edgeGeom = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.02,1.02,1.02));
  const highlight = new THREE.LineSegments(edgeGeom, new THREE.LineBasicMaterial({ color:0xffffff }));
  highlight.visible = false;
  scene.add(highlight);

  // ================= Player =================
  const player = { x:0.5, y:10, z:0.5, yaw:0, pitch:0, velY:0, grounded:false };
  const GRAVITY = 24;
  const JUMP_SPEED = 8.6;
  const WALK_SPEED = 4.4;
  const SPRINT_MULT = 1.6;
  const FLY_SPEED = 9;
  const EYE_HEIGHT = 1.6;
  let flying = false;

  function respawnPlayer(){
    const h = terrainHeight(0,0);
    player.x = 0.5; player.z = 0.5; player.y = Math.max(h, SEA_LEVEL) + 1.5;
    player.yaw = 0; player.pitch = 0; player.velY = 0; player.grounded = false;
    flying = false;
  }

  function canOccupy(x,y,z){
    for(let hgt=0.1; hgt<=1.5; hgt+=0.6){
      if(isSolidAt(x,y+hgt,z)) return false;
    }
    return true;
  }

  // ================= Input =================
  const keysDown = new Set();
  let locked = false;
  let lastSpaceTime = -1000;
  const startOverlay = document.getElementById('startOverlay');

  function requestLock(){
    if(document.pointerLockElement !== canvas) canvas.requestPointerLock();
  }
  canvas.addEventListener('click', requestLock);
  startOverlay.addEventListener('click', requestLock);
  document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === canvas;
    startOverlay.classList.toggle('hidden', locked);
    if(!locked) keysDown.clear();
  });
  document.addEventListener('pointerlockerror', () => {
    startOverlay.querySelector('p').textContent =
      'マウスロックに失敗しました。ブラウザの設定でこのページへのアクセス許可が必要な場合があります。もう一度クリックしてみてください。';
  });
  document.addEventListener('mousemove', (e) => {
    if(!locked) return;
    const SENS = 0.0022;
    player.yaw -= e.movementX * SENS;
    player.pitch -= e.movementY * SENS;
    const lim = Math.PI/2 - 0.05;
    if(player.pitch > lim) player.pitch = lim;
    if(player.pitch < -lim) player.pitch = -lim;
  });

  window.addEventListener('keydown', (e) => {
    if(!locked) return;
    keysDown.add(e.code);
    if(e.code === 'Space' && !e.repeat){
      const now = performance.now();
      if(now - lastSpaceTime < 300){
        flying = !flying;
        player.velY = 0;
        lastSpaceTime = -1000;
      } else {
        lastSpaceTime = now;
        if(!flying && player.grounded){ player.velY = JUMP_SPEED; player.grounded = false; }
      }
    }
    if(e.code >= 'Digit1' && e.code <= 'Digit7'){
      const idx = parseInt(e.code.replace('Digit',''),10) - 1;
      if(idx < typeNames.length){ selectedIndex = idx; updateHotbarSel(); }
    }
  });
  window.addEventListener('keyup', (e) => keysDown.delete(e.code));

  canvas.addEventListener('mousedown', (e) => {
    if(!locked) return;
    if(e.button === 0){
      const t = getTarget();
      if(t){ worldData.delete(key(...t.target)); rebuildMeshes(); }
    } else if(e.button === 2){
      const t = getTarget();
      if(t && t.place){
        const [px,py,pz] = t.place;
        const feet = [Math.floor(player.x), Math.floor(player.y), Math.floor(player.z)];
        const head = [Math.floor(player.x), Math.floor(player.y+1.2), Math.floor(player.z)];
        const same = (a,b) => a[0]===b[0] && a[1]===b[1] && a[2]===b[2];
        if(!same([px,py,pz], feet) && !same([px,py,pz], head)){
          worldData.set(key(px,py,pz), typeNames[selectedIndex]);
          rebuildMeshes();
        }
      }
    }
  });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  canvas.addEventListener('wheel', (e) => {
    if(!locked) return;
    selectedIndex = (selectedIndex + (e.deltaY > 0 ? 1 : -1) + typeNames.length) % typeNames.length;
    updateHotbarSel();
  });

  document.getElementById('newWorldBtn').addEventListener('click', () => {
    generateWorld(); rebuildMeshes(); respawnPlayer();
  });

  // ================= Hotbar UI =================
  const hotbarEl = document.getElementById('hotbar');
  typeNames.forEach((t, i) => {
    const slot = document.createElement('div');
    slot.className = 'slot' + (i===selectedIndex ? ' sel' : '');
    slot.style.backgroundImage = `url(${BLOCK_TYPES[t].icon})`;
    const label = document.createElement('em');
    label.textContent = BLOCK_TYPES[t].label;
    slot.appendChild(label);
    const num = document.createElement('span');
    num.textContent = i+1;
    slot.appendChild(num);
    slot.addEventListener('click', () => { selectedIndex = i; updateHotbarSel(); });
    hotbarEl.appendChild(slot);
  });
  function updateHotbarSel(){
    Array.from(hotbarEl.children).forEach((c,i) => c.classList.toggle('sel', i===selectedIndex));
  }

  // ================= Raycast targeting =================
  const _dir = new THREE.Vector3();
  function getTarget(){
    camera.getWorldDirection(_dir);
    const origin = camera.position;
    const step = 0.06;
    let prevBlock = null;
    for(let t=0; t<6; t+=step){
      const px = origin.x + _dir.x*t, py = origin.y + _dir.y*t, pz = origin.z + _dir.z*t;
      const bx = Math.floor(px), by = Math.floor(py), bz = Math.floor(pz);
      if(isSolidAt(bx,by,bz)) return { target:[bx,by,bz], place: prevBlock };
      prevBlock = [bx,by,bz];
    }
    return null;
  }

  // ================= Day/night cycle =================
  const DAY_LENGTH = 240; // seconds per full cycle
  let dayTime = 0.28; // start mid-morning
  const dayIndicatorEl = document.getElementById('dayIndicator');
  const skyDay = new THREE.Color(0x87ceeb);
  const skyNight = new THREE.Color(0x0b0e2a);
  const tmpColor = new THREE.Color();

  function updateDayNight(dt){
    dayTime = (dayTime + dt/DAY_LENGTH) % 1;
    const angle = dayTime * Math.PI * 2;
    const height = Math.sin(angle);
    sun.position.set(Math.cos(angle)*60, height*60 + 5, 20);
    const bright = Math.max(0.08, height*0.5 + 0.5);
    sun.intensity = 0.25 + bright*0.75;
    ambient.intensity = 0.25 + bright*0.45;
    tmpColor.copy(skyNight).lerp(skyDay, bright);
    scene.background = tmpColor;
    scene.fog.color = tmpColor;
    dayIndicatorEl.textContent = height > 0.05 ? '☀️' : (height > -0.35 ? '🌇' : '🌙');
  }

  // ================= Main loop =================
  const clock = new THREE.Clock();
  const fwd = new THREE.Vector3();
  const right = new THREE.Vector3();
  const up = new THREE.Vector3(0,1,0);

  function tick(){
    requestAnimationFrame(tick);
    const dt = Math.min(clock.getDelta(), 0.05);
    updateDayNight(dt);

    if(locked){
      fwd.set(0,0,-1).applyAxisAngle(up, player.yaw);
      right.set(1,0,0).applyAxisAngle(up, player.yaw);
      let mvY = (keysDown.has('KeyW')?1:0) - (keysDown.has('KeyS')?1:0);
      let mvX = (keysDown.has('KeyD')?1:0) - (keysDown.has('KeyA')?1:0);
      const len = Math.hypot(mvX,mvY);
      if(len > 1){ mvX/=len; mvY/=len; }

      const sprinting = keysDown.has('ShiftLeft') || keysDown.has('ShiftRight');
      const speed = (flying ? FLY_SPEED : WALK_SPEED) * (sprinting && !flying ? SPRINT_MULT : 1);

      const dx = (fwd.x*mvY + right.x*mvX) * speed * dt;
      const dz = (fwd.z*mvY + right.z*mvX) * speed * dt;

      if(dx !== 0){ const nx = player.x+dx; if(canOccupy(nx, player.y, player.z)) player.x = nx; }
      if(dz !== 0){ const nz = player.z+dz; if(canOccupy(player.x, player.y, nz)) player.z = nz; }

      const inWater = typeAt(player.x, player.y+0.7, player.z) === 'water';

      if(flying){
        player.velY = 0;
        let vy = 0;
        if(keysDown.has('Space')) vy += 1;
        if(sprinting) vy -= 1;
        const ny = player.y + vy*FLY_SPEED*dt;
        if(vy === 0 || canOccupy(player.x, ny, player.z) || canOccupy(player.x, ny+EYE_HEIGHT, player.z)){
          player.y = ny;
        }
        player.grounded = false;
      } else {
        const gravMult = inWater ? 0.25 : 1;
        player.velY -= GRAVITY * gravMult * dt;
        if(inWater){
          if(player.velY < -2.5) player.velY = -2.5;
          if(keysDown.has('Space')) player.velY = 2.5;
        }
        let ny = player.y + player.velY*dt;
        if(player.velY <= 0){
          if(isSolidAt(player.x, ny, player.z)){
            player.y = Math.floor(ny) + 1;
            player.velY = 0;
            player.grounded = true;
          } else { player.y = ny; player.grounded = false; }
        } else {
          if(isSolidAt(player.x, ny+EYE_HEIGHT, player.z)){ player.velY = 0; }
          else { player.y = ny; }
        }
      }

      if(player.y < -30) respawnPlayer();
    }

    camera.position.set(player.x, player.y + EYE_HEIGHT, player.z);
    camera.rotation.set(player.pitch, player.yaw, 0);

    const t = getTarget();
    if(t){
      const [bx,by,bz] = t.target;
      highlight.position.set(bx+0.5, by+0.5, bz+0.5);
      highlight.visible = true;
    } else {
      highlight.visible = false;
    }

    renderer.render(scene, camera);
  }

  // ================= Init =================
  generateWorld();
  rebuildMeshes();
  respawnPlayer();
  updateHotbarSel();
  tick();

})();
</script>
</body>
</html>
