<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HikaCra ゲームセンター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #171522;
    --bg2: #201d30;
    --ink: #f1eee6;
    --ink-dim: #a9a4bd;
    --grass: #6cbf4b;
    --grass-dark: #3f7a2d;
    --cyan: #4bc6d9;
    --cyan-dark: #2b7f8f;
    --coral: #e2653f;
    --coral-dark: #a13f22;
    --outline: #0d0c14;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(circle at 15% 20%, rgba(108,191,75,0.07), transparent 40%),
      radial-gradient(circle at 85% 75%, rgba(75,198,217,0.07), transparent 40%),
      var(--bg);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    overflow-x: hidden;
  }

  /* pixel noise floor texture */
  body::before{
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events:none;
    z-index:0;
  }

  .wrap{
    position:relative; z-index:1;
    max-width: 980px;
    margin: 0 auto;
    padding: 64px 24px 80px;
  }

  header{
    text-align:center;
    margin-bottom: 56px;
  }

  .eyebrow{
    font-family:'Press Start 2P', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--grass);
    margin-bottom: 18px;
    opacity:0.85;
  }

  h1{
    font-family:'Press Start 2P', monospace;
    font-size: clamp(28px, 6vw, 46px);
    line-height:1.5;
    margin:0 0 14px;
    color:#fff;
    text-shadow:
      3px 3px 0 var(--outline),
      6px 6px 0 rgba(0,0,0,0.25);
    letter-spacing: 1px;
  }

  .sub{
    color: var(--ink-dim);
    font-size: 15px;
    max-width: 480px;
    margin: 0 auto;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }
  @media (max-width: 760px){
    .grid{ grid-template-columns: 1fr; }
  }

  .card{
    position:relative;
    display:block;
    text-decoration:none;
    color: var(--ink);
    background: var(--bg2);
    border: 4px solid var(--outline);
    box-shadow:
      inset 0 0 0 3px rgba(255,255,255,0.06),
      8px 8px 0 var(--outline);
    padding: 0;
    transition: transform .12s ease, box-shadow .12s ease;
    overflow:hidden;
  }

  .card:hover, .card:focus-visible{
    transform: translate(-4px,-4px);
    box-shadow:
      inset 0 0 0 3px rgba(255,255,255,0.08),
      12px 12px 0 var(--outline);
    outline:none;
  }
  .card:active{
    transform: translate(0,0);
    box-shadow:
      inset 0 0 0 3px rgba(255,255,255,0.06),
      4px 4px 0 var(--outline);
  }

  .tile{
    height: 128px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    image-rendering: pixelated;
  }

  .tile .blocks{
    display:grid;
    grid-template-columns: repeat(3, 26px);
    grid-template-rows: repeat(3, 26px);
    gap: 4px;
  }
  .tile .blocks span{
    display:block;
    border: 2px solid var(--outline);
  }

  .t-hikacra .tile{ background: linear-gradient(180deg, #4a9a35, #3f7a2d); }
  .t-hikacra .blocks span{ background: var(--grass); }
  .t-hikacra .blocks span:nth-child(2), .t-hikacra .blocks span:nth-child(4),
  .t-hikacra .blocks span:nth-child(6), .t-hikacra .blocks span:nth-child(8){ background:#8bd66b; }

  .t-tetris .tile{ background: linear-gradient(180deg, #2f8a99, #2b7f8f); }
  .t-tetris .blocks{ grid-template-columns: repeat(4, 20px); grid-template-rows: repeat(2, 20px); }
  .t-tetris .blocks span{ background: var(--cyan); border-radius:1px; }
  .t-tetris .blocks span:nth-child(3){ background:#f2d34b; }
  .t-tetris .blocks span:nth-child(6){ background:#e2653f; }
  .t-tetris .blocks span:nth-child(7){ background:transparent; border-color:transparent; }
  .t-tetris .blocks span:nth-child(8){ background:transparent; border-color:transparent; }

  .t-blocks .tile{ background: linear-gradient(180deg, #c1502e, #a13f22); }
  .t-blocks .blocks{ grid-template-columns: repeat(4, 20px); grid-template-rows: repeat(2, 12px); }
  .t-blocks .blocks span{ background: var(--coral); }
  .t-blocks .blocks span:nth-child(odd){ background:#f2916c; }

  .label{
    padding: 18px 18px 22px;
    border-top: 4px solid var(--outline);
    background: var(--bg2);
  }

  .name{
    font-family:'Press Start 2P', monospace;
    font-size: 13px;
    margin: 0 0 8px;
    color: #fff;
  }

  .desc{
    font-size: 13px;
    color: var(--ink-dim);
    margin:0;
    line-height:1.6;
  }

  .badge{
    position:absolute;
    top:10px; right:10px;
    font-family:'Press Start 2P', monospace;
    font-size: 8px;
    background: rgba(0,0,0,0.55);
    color:#fff;
    padding: 5px 7px;
    border: 2px solid var(--outline);
  }

  footer{
    text-align:center;
    margin-top: 64px;
    color: var(--ink-dim);
    font-size: 12px;
  }
  footer .heart{ color: var(--coral); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">&gt; SELECT A WORLD_</div>
      <h1>HikaCra</h1>
      <p class="sub">遊びたいゲームをクリックしてね。ぜんぶブラウザだけで遊べます。</p>
    </header>

    <div class="grid">
      <a class="card t-hikacra" href="hikacra.html">
        <span class="badge">3D</span>
        <div class="tile">
          <div class="blocks">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="label">
          <p class="name">HikaCra</p>
          <p class="desc">ブロックを積んで壊す、自由に歩き回れる世界。</p>
        </div>
      </a>

      <a class="card t-tetris" href="tetris.html">
        <span class="badge">PZL</span>
        <div class="tile">
          <div class="blocks">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span style="background:transparent;border-color:transparent;"></span><span style="background:transparent;border-color:transparent;"></span>
          </div>
        </div>
        <div class="label">
          <p class="name">テトリス</p>
          <p class="desc">落ちてくるブロックを揃えてラインを消そう。</p>
        </div>
      </a>

      <a class="card t-blocks" href="blockkuzushi.html">
        <span class="badge">ACT</span>
        <div class="tile">
          <div class="blocks">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="label">
          <p class="name">ブロック崩し</p>
          <p class="desc">ボールを跳ね返して、上のブロックを全部壊せ。</p>
        </div>
      </a>
    </div>

    <footer>
      made with <span class="heart">♥</span> — HikaCra Game Center
    </footer>
  </div>
</body>
</html>
