<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ボクセルクラフト v6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", monospace; }
  #game { display: block; width: 100%; height: 100%; }

  #crosshair {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 22px; height: 22px; pointer-events: none; opacity: .85;
  }
  #crosshair::before, #crosshair::after { content: ""; position: absolute; background: #fff; mix-blend-mode: difference; }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

  #hotbar {
    position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%);
    display: flex; gap: 3px; padding: 4px; background: rgba(0,0,0,.45);
    border: 2px solid rgba(255,255,255,.25); border-radius: 6px;
  }
  .slot { width: 44px; height: 44px; border: 2px solid rgba(255,255,255,.3); border-radius: 4px; position: relative; cursor: pointer; overflow: hidden; }
  .slot.sel { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,.7); }
  .slot img { position: absolute; inset: 5px; width: 30px; height: 30px; image-rendering: pixelated; }
  .slot .num { position: absolute; top: 0; left: 2px; font-size: 9px; color: #fff; text-shadow: 1px 1px 0 #000; z-index: 1; }
  .slot .nm  { position: absolute; bottom: 0; width: 100%; text-align: center; font-size: 8px; color: #fff; text-shadow: 1px 1px 0 #000; z-index: 1; }
  .slot .cnt { position: absolute; bottom: 8px; right: 2px; font-size: 11px; font-weight: bold; color: #ffe; text-shadow: 1px 1px 0 #000; z-index: 1; }
  .slot.empty img { opacity: .35; }

  #status { position: fixed; left: 50%; bottom: 70px; transform: translateX(-50%); width: 420px; pointer-events: none; }
  #statusRow { display: flex; justify-content: space-between; }
  #hearts, #hunger { display: flex; gap: 1px; }
  #bubbles { display: flex; gap: 1px; justify-content: flex-end; margin-bottom: 2px; }
  .heart { position: relative; width: 18px; height: 20px; font-size: 17px; line-height: 20px; color: #4a2626; text-shadow: 1px 1px 0 #000; }
  .heart .fill { position: absolute; left: 0; top: 0; height: 100%; overflow: hidden; color: #e83030; white-space: nowrap; }
  .hg { position: relative; width: 19px; height: 20px; font-size: 14px; line-height: 20px; color: #3a3226; }
  .hg .fill { position: absolute; left: 0; top: 0; height: 100%; overflow: hidden; white-space: nowrap; filter: none; }
  .hg .bg { filter: grayscale(1) brightness(.45); }
  .bub { font-size: 13px; color: #9fd8ff; text-shadow: 1px 1px 0 #023; }

  #overlay {
    position: fixed; inset: 0; background: rgba(10, 20, 35, .82);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; z-index: 10; cursor: pointer; text-align: center;
  }
  #overlay h1 { font-size: 42px; letter-spacing: .12em; text-shadow: 3px 3px 0 #2a5b23; margin-bottom: 12px; }
  #overlay p { line-height: 1.9; font-size: 12.5px; color: #d8e4f0; }
  #overlay .start { margin-top: 18px; padding: 12px 34px; background: #58a63c; border: 2px solid #7fd45f;
    border-radius: 4px; font-size: 18px; color: #fff; text-shadow: 1px 1px 0 #2a5b23; }
  #overlay .start:hover { background: #6bc04a; }
  kbd { background: #33475e; border-radius: 3px; padding: 1px 5px; font-size: 11px; border: 1px solid #55708f; }

  #deathScreen {
    position: fixed; inset: 0; background: rgba(120, 10, 10, .55); z-index: 20;
    display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff;
  }
  #deathScreen h2 { font-size: 40px; text-shadow: 3px 3px 0 #400; margin-bottom: 20px; }
  #deathScreen button { padding: 12px 36px; font-size: 18px; background: #58a63c; color: #fff;
    border: 2px solid #7fd45f; border-radius: 4px; cursor: pointer; }

  #craftPanel {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 460px; max-height: 74vh; overflow-y: auto; z-index: 15; display: none;
    background: rgba(20, 26, 34, .95); border: 3px solid #5a708a; border-radius: 8px;
    padding: 14px; color: #fff;
  }
  #craftPanel h3 { text-align: center; margin-bottom: 10px; letter-spacing: .2em; }
  .recipe { display: flex; align-items: center; gap: 10px; padding: 7px 8px; margin-bottom: 5px;
    background: rgba(255,255,255,.06); border-radius: 5px; }
  .recipe img { width: 30px; height: 30px; image-rendering: pixelated; }
  .recipe .info { flex: 1; }
  .recipe .rname { font-size: 14px; }
  .recipe .rneeds { font-size: 11px; color: #a8b8c8; }
  .recipe button { padding: 6px 16px; background: #58a63c; color: #fff; border: 1px solid #7fd45f;
    border-radius: 4px; cursor: pointer; font-size: 13px; }
  .recipe button:disabled { background: #444; border-color: #666; color: #999; cursor: default; }
  #craftClose { display: block; margin: 8px auto 0; padding: 7px 24px; background: #7a4a3a; color: #fff;
    border: 1px solid #aa7a5a; border-radius: 4px; cursor: pointer; }

  #waterOverlay { position: fixed; inset: 0; background: rgba(25, 70, 160, .35); pointer-events: none; display: none; z-index: 5; }
  #dmgFlash { position: fixed; inset: 0; background: rgba(255, 20, 20, .4); pointer-events: none; opacity: 0; z-index: 6; }
  #hud { position: fixed; top: 10px; left: 12px; color: #fff; font-size: 12px; text-shadow: 1px 1px 0 #000; opacity: .9; pointer-events: none; line-height: 1.7; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="crosshair" hidden></div>
<div id="hud" hidden></div>
<div id="waterOverlay"></div>
<div id="dmgFlash"></div>
<div id="status" hidden>
  <div id="bubbles"></div>
  <div id="statusRow">
    <div id="hearts"></div>
    <div id="hunger"></div>
  </div>
</div>
<div id="hotbar" hidden></div>

<div id="overlay">
  <h1>ボクセルクラフト</h1>
  <p>
    <kbd>WASD</kbd> 移動 / <kbd>Space</kbd> ジャンプ・泳ぐ / <kbd>Shift</kbd> ダッシュ / <kbd>F5</kbd> 視点切替 / <kbd>M</kbd> モード切替<br>
    <kbd>左クリック長押し</kbd> 採掘 / <kbd>右クリック</kbd> 設置・食べる / <kbd>E</kbd> <b>クラフト</b><br>
    木を素手で殴って原木を集める → 板材と棒を作る → <b>ピッケル</b>を作ると石や鉱石が掘れる!<br>
    鉱石は上位のピッケルが必要(石→木 / 鉄→石 / ダイヤ→鉄)。豚から肉、羊から羊毛。お腹が減ると回復しなくなるぞ。
  </p>
  <div class="start">クリックしてスタート</div>
</div>

<div id="deathScreen">
  <h2>死んでしまった!</h2>
  <button id="respawnBtn">リスポーンする</button>
</div>

<div id="craftPanel">
  <h3>クラフト</h3>
  <div id="recipeList"></div>
  <button id="craftClose">閉じる (E)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";

/* ================================================================
   1. ピクセルテクスチャ & アイコン生成
================================================================ */
const TEX_CANVAS = {};
function makeTex(name, painter) {
  const c = document.createElement("canvas");
  c.width = c.height = 16;
  painter(c.getContext("2d"));
  TEX_CANVAS[name] = c;
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter;              // 近くはカクカクのドット絵
  t.minFilter = THREE.NearestMipmapLinearFilter;  // 遠くはミップマップで滑らかに
  t.generateMipmaps = true;
  t.anisotropy = 4;
  return t;
}
const rgb = (r, g, b) => `rgb(${r | 0},${g | 0},${b | 0})`;
const rnd = (a, b) => a + Math.random() * (b - a);
function speckle(g, [r, gr, b], amp) {
  for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
    const v = rnd(-amp, amp);
    g.fillStyle = rgb(r + v, gr + v, b + v);
    g.fillRect(x, y, 1, 1);
  }
}
function dots(g, color, n, size = 1) {
  g.fillStyle = color;
  for (let i = 0; i < n; i++) g.fillRect(rnd(0, 16 - size) | 0, rnd(0, 16 - size) | 0, size, size);
}

const T = {};
/* --- 描画ヘルパー --- */
function bevel(g, lite = 0.14, dark = 0.18) {
  g.fillStyle = `rgba(255,255,255,${lite})`; g.fillRect(0, 0, 16, 1); g.fillRect(0, 1, 1, 15);
  g.fillStyle = `rgba(0,0,0,${dark})`;       g.fillRect(0, 15, 16, 1); g.fillRect(15, 1, 1, 14);
}
function clumps(g, base, n) { // 立体感のある土くれ(上面ハイライト+下面シャドウ)
  for (let i = 0; i < n; i++) {
    const x = rnd(0, 13) | 0, y = rnd(0, 13) | 0, w = rnd(2, 4) | 0, h = rnd(2, 3) | 0;
    const v = rnd(-22, 22);
    g.fillStyle = rgb(base[0] + v, base[1] + v, base[2] + v); g.fillRect(x, y, w, h);
    g.fillStyle = rgb(base[0] + v + 20, base[1] + v + 18, base[2] + v + 14); g.fillRect(x, y, w, 1);
    g.fillStyle = rgb(base[0] + v - 22, base[1] + v - 20, base[2] + v - 16); g.fillRect(x, y + h - 1, w, 1);
  }
}
function paintDirt(g) {
  speckle(g, [132, 90, 54], 8);
  clumps(g, [132, 90, 54], 9);
  dots(g, rgb(150, 150, 148), 3);      // 小石
  dots(g, rgb(96, 62, 36), 8);
}
function paintStone(g) {
  speckle(g, [128, 128, 128], 5);
  for (let i = 0; i < 6; i++) {
    const x = rnd(0, 11) | 0, y = rnd(0, 11) | 0, w = rnd(3, 5) | 0, h = rnd(2, 4) | 0;
    const v = rnd(106, 138) | 0;
    g.fillStyle = rgb(v, v, v); g.fillRect(x, y, w, h);
    g.fillStyle = rgb(v + 16, v + 16, v + 16); g.fillRect(x, y, w, 1);
    g.fillStyle = rgb(v - 18, v - 18, v - 18); g.fillRect(x, y + h - 1, w, 1); g.fillRect(x + w - 1, y, 1, h);
  }
  dots(g, rgb(96, 96, 96), 5);
  bevel(g, 0.08, 0.15);
}

T.grassTop = makeTex("grassTop", g => {
  speckle(g, [88, 150, 60], 8);
  for (let i = 0; i < 34; i++) {       // 草の葉先(縦2pxのブレード)
    const x = rnd(0, 16) | 0, y = rnd(0, 14) | 0;
    g.fillStyle = Math.random() < 0.5 ? rgb(118, 188, 82) : rgb(62, 116, 44);
    g.fillRect(x, y, 1, 2);
  }
  dots(g, rgb(140, 205, 96), 6);
  bevel(g, 0.1, 0.12);
});
T.dirt = makeTex("dirt", g => { paintDirt(g); bevel(g, 0.07, 0.13); });
T.grassSide = makeTex("grassSide", g => {
  paintDirt(g);
  // 草のかぶり: 3段グラデーション + 垂れ下がり
  g.fillStyle = rgb(112, 180, 76); g.fillRect(0, 0, 16, 1);
  g.fillStyle = rgb(96, 158, 64);  g.fillRect(0, 1, 16, 1);
  g.fillStyle = rgb(82, 138, 54);  g.fillRect(0, 2, 16, 1);
  for (let x = 0; x < 16; x++) {
    const len = Math.random() < 0.55 ? 1 + (Math.random() < 0.35 ? 1 : 0) : 0;
    if (len) { g.fillStyle = rgb(76, 128, 50); g.fillRect(x, 3, 1, len); }
  }
  g.fillStyle = "rgba(0,0,0,0.25)"; g.fillRect(0, 3, 16, 1); // 草の影
  bevel(g, 0.06, 0.13);
});
T.stone = makeTex("stone", paintStone);
T.cobble = makeTex("cobble", g => {
  speckle(g, [78, 78, 78], 6);         // 目地(暗)
  for (let i = 0; i < 8; i++) {
    const x = rnd(0, 11) | 0, y = rnd(0, 11) | 0, s = rnd(3, 6) | 0;
    const v = rnd(104, 148) | 0;
    g.fillStyle = rgb(v, v, v); g.fillRect(x, y, s, s);
    // 角を落として丸石らしく
    g.fillStyle = rgb(80, 80, 80);
    g.fillRect(x, y, 1, 1); g.fillRect(x + s - 1, y + s - 1, 1, 1);
    g.fillStyle = rgb(v + 28, v + 28, v + 28); g.fillRect(x + 1, y, s - 2, 1);
    g.fillStyle = rgb(v - 26, v - 26, v - 26);
    g.fillRect(x + 1, y + s - 1, s - 2, 1); g.fillRect(x + s - 1, y + 1, 1, s - 2);
  }
  bevel(g, 0.06, 0.16);
});
T.planks = makeTex("planks", g => {
  speckle(g, [172, 134, 80], 6);
  for (let row = 0; row < 4; row++) {
    const y = row * 4, tone = (row % 2 ? -8 : 8);
    // 板ごとの色味の差
    g.fillStyle = `rgba(${tone > 0 ? "255,235,200" : "80,55,30"},0.12)`;
    g.fillRect(0, y, 16, 4);
    // 木目(途切れのある細線)
    g.fillStyle = rgb(136, 100, 58);
    for (let seg = 0; seg < 3; seg++) {
      const sx = rnd(0, 10) | 0;
      g.fillRect(sx, y + 1 + (seg % 2), rnd(3, 6) | 0, 1);
    }
    // 板の境目: 影 + 次の板のハイライト
    g.fillStyle = rgb(104, 74, 42); g.fillRect(0, y + 3, 16, 1);
    if (row < 3) { g.fillStyle = rgb(198, 160, 102); g.fillRect(0, y + 4, 16, 1); }
    // 継ぎ目と釘
    const jx = (row * 5 + 4) % 14 + 1;
    g.fillStyle = rgb(104, 74, 42); g.fillRect(jx, y, 1, 3);
    g.fillStyle = rgb(64, 46, 26); g.fillRect(jx - 1, y + 1, 1, 1); g.fillRect(jx + 1, y + 1, 1, 1);
  }
  bevel(g, 0.06, 0.12);
});
T.logSide = makeTex("logSide", g => {
  for (let x = 0; x < 16; x += 2) {    // 樹皮の縦うね
    const v = 100 + (((x / 2) % 2) ? -14 : 10) + rnd(-6, 6);
    g.fillStyle = rgb(v, v * 0.72, v * 0.43); g.fillRect(x, 0, 2, 16);
    g.fillStyle = rgb(v - 26, (v - 26) * 0.72, (v - 26) * 0.43); g.fillRect(x + 1, 0, 1, 16);
  }
  for (let i = 0; i < 2; i++) {        // 節(ふし)
    const x = rnd(2, 12) | 0, y = rnd(2, 11) | 0;
    g.fillStyle = rgb(66, 46, 26); g.fillRect(x, y, 3, 3);
    g.fillStyle = rgb(150, 112, 66); g.fillRect(x + 1, y + 1, 1, 1);
  }
  bevel(g, 0.05, 0.12);
});
T.logTop = makeTex("logTop", g => {
  g.fillStyle = rgb(92, 64, 36); g.fillRect(0, 0, 16, 16);       // 樹皮の縁
  for (let r = 6; r >= 1; r--) {       // 年輪(明暗交互の矩形リング)
    g.fillStyle = r % 2 ? rgb(182, 144, 90) : rgb(140, 106, 62);
    g.fillRect(8 - r, 8 - r, r * 2, r * 2);
  }
  g.fillStyle = rgb(206, 168, 110); g.fillRect(7, 7, 2, 2);      // 芯
  dots(g, rgb(120, 88, 50), 8);
  bevel(g, 0.06, 0.12);
});
T.leaves = makeTex("leaves", g => {
  g.fillStyle = rgb(26, 56, 22); g.fillRect(0, 0, 16, 16);       // 奥の暗がり
  for (let i = 0; i < 34; i++) {       // 葉のかたまり
    const v = rnd(-18, 18);
    g.fillStyle = rgb(58 + v, 118 + v, 44 + v * 0.7);
    g.fillRect(rnd(0, 14) | 0, rnd(0, 14) | 0, 2, 2);
  }
  dots(g, rgb(96, 162, 66), 14);       // 光が当たる葉
  dots(g, rgb(14, 34, 12), 6);         // 隙間
});
T.pineLeaves = makeTex("pineLeaves", g => {
  g.fillStyle = rgb(14, 42, 30); g.fillRect(0, 0, 16, 16);
  for (let i = 0; i < 32; i++) {
    const v = rnd(-14, 14);
    g.fillStyle = rgb(36 + v, 90 + v, 56 + v * 0.7);
    g.fillRect(rnd(0, 14) | 0, rnd(0, 14) | 0, 2, 2);
  }
  dots(g, rgb(66, 128, 84), 12);
  dots(g, rgb(8, 24, 16), 6);
});
T.sand = makeTex("sand", g => {
  speckle(g, [220, 206, 150], 6);
  for (const y of [2, 6, 10, 14]) {    // 風紋
    let x = rnd(0, 4) | 0;
    while (x < 16) {
      const len = rnd(3, 7) | 0;
      g.fillStyle = rgb(236, 224, 172); g.fillRect(x, y, len, 1);
      g.fillStyle = rgb(198, 184, 128); g.fillRect(x, y + 1, len, 1);
      x += len + (rnd(2, 5) | 0);
    }
  }
  dots(g, rgb(184, 168, 116), 8);
  bevel(g, 0.06, 0.1);
});
T.glass = makeTex("glass", g => {
  g.clearRect(0, 0, 16, 16);
  g.fillStyle = "rgba(205,232,255,0.22)"; g.fillRect(0, 0, 16, 16);
  g.fillStyle = "rgba(255,255,255,0.95)";
  g.fillRect(0, 0, 16, 1); g.fillRect(0, 15, 16, 1); g.fillRect(0, 0, 1, 16); g.fillRect(15, 0, 1, 16);
  g.fillStyle = "rgba(235,246,255,0.7)";                          // 斜めの反射光
  for (let i = 0; i < 6; i++) g.fillRect(3 + i, 8 - i, 1, 1);
  for (let i = 0; i < 4; i++) g.fillRect(7 + i, 11 - i, 1, 1);
  g.fillStyle = "rgba(150,190,230,0.35)"; g.fillRect(12, 11, 2, 3);
});
T.bedrock = makeTex("bedrock", g => {
  speckle(g, [64, 64, 64], 10);
  for (let i = 0; i < 9; i++) {
    const x = rnd(0, 11) | 0, y = rnd(0, 11) | 0, w = rnd(3, 5) | 0, h = rnd(2, 5) | 0;
    const v = rnd(28, 118) | 0;
    g.fillStyle = rgb(v, v, v); g.fillRect(x, y, w, h);
    g.fillStyle = rgb(Math.max(0, v - 22), Math.max(0, v - 22), Math.max(0, v - 22));
    g.fillRect(x, y + h - 1, w, 1); g.fillRect(x + w - 1, y, 1, h);
  }
  bevel(g, 0.05, 0.2);
});
T.brick = makeTex("brick", g => {
  speckle(g, [168, 164, 158], 4);      // モルタル(明)
  for (let row = 0; row < 4; row++) {
    const off = row % 2 ? 4 : 0;
    for (let cx = -1; cx < 3; cx++) {
      const r = rnd(158, 178) | 0, gg = rnd(66, 82) | 0, b = rnd(54, 68) | 0;
      const bx = cx * 8 + off + 1, by = row * 4 + 1;
      g.fillStyle = rgb(r, gg, b); g.fillRect(bx, by, 7, 3);
      g.fillStyle = rgb(r + 26, gg + 20, b + 16); g.fillRect(bx, by, 7, 1);
      g.fillStyle = rgb(r - 30, gg - 18, b - 14); g.fillRect(bx, by + 2, 7, 1);
      if (Math.random() < 0.5) { g.fillStyle = rgb(r - 20, gg - 12, b - 8); g.fillRect(bx + (rnd(1, 5) | 0), by + 1, 1, 1); }
    }
  }
  bevel(g, 0.05, 0.12);
});
T.snow = makeTex("snow", g => {
  speckle(g, [240, 244, 250], 4);
  dots(g, rgb(214, 224, 238), 16);     // 青みの影
  dots(g, rgb(255, 255, 255), 6);      // きらめき
  bevel(g, 0.05, 0.08);
});
T.snowSide = makeTex("snowSide", g => {
  paintDirt(g);
  g.fillStyle = rgb(244, 248, 252); g.fillRect(0, 0, 16, 3);      // 雪のかぶり
  g.fillStyle = rgb(224, 232, 244); g.fillRect(0, 3, 16, 1);
  for (let x = 0; x < 16; x++) {       // 垂れ下がる雪
    if (Math.random() < 0.4) { g.fillStyle = rgb(234, 240, 248); g.fillRect(x, 4, 1, 1 + (Math.random() < 0.3 ? 1 : 0)); }
  }
  g.fillStyle = "rgba(40,60,90,0.2)"; g.fillRect(0, 4, 16, 1);
  bevel(g, 0.05, 0.12);
});
T.wool = makeTex("wool", g => {
  speckle(g, [232, 232, 232], 5);
  for (let y = 0; y < 16; y += 2)      // 編み目
    for (let x = 0; x < 16; x += 2)
      if ((x + y) % 4 === 0) { g.fillStyle = rgb(216, 216, 221); g.fillRect(x, y, 2, 2); }
  dots(g, rgb(202, 202, 208), 10);
  dots(g, rgb(248, 248, 250), 8);
  bevel(g, 0.06, 0.09);
});
T.goldBlock = makeTex("goldBlock", g => {
  speckle(g, [238, 196, 66], 8);
  g.fillStyle = rgb(255, 238, 145);    // 外枠の光
  g.fillRect(0, 0, 16, 1); g.fillRect(0, 0, 1, 16);
  g.fillStyle = rgb(168, 126, 30);
  g.fillRect(0, 15, 16, 1); g.fillRect(15, 0, 1, 16);
  g.fillStyle = rgb(252, 224, 108);    // 内枠
  g.fillRect(2, 2, 12, 1); g.fillRect(2, 2, 1, 12);
  g.fillStyle = rgb(196, 152, 44);

const CHUNK = 16, VIEW_R = 4, MAX_Y = 52, WATER_Y = 5;
const blocks = new Map();
const genChunks = new Set();
const chunkMeshes = new Map();
const meshPos = new Map();
const key = (x, y, z) => x + "," + y + "," + z;
const ckey = (cx, cz) => cx + "," + cz;

function hash(x, z) {
  let n = (x * 374761393 + z * 668265263) ^ 0x5f3759df;
  n = (n ^ (n >> 13)) * 1274126177;
  return ((n ^ (n >> 16)) >>> 0) / 4294967295;
}
function hash3(x, y, z) {
  let n = x * 374761393 + y * 3266489917 + z * 668265263;
  n = (n ^ (n >> 13)) * 1274126177;
  return ((n ^ (n >> 16)) >>> 0) / 4294967295;
}
const sm = t => t * t * (3 - 2 * t);
function noise(x, z, scale) {
  const fx = x / scale, fz = z / scale;
  const x0 = Math.floor(fx), z0 = Math.floor(fz);
  const tx = sm(fx - x0), tz = sm(fz - z0);
  const a = hash(x0, z0), b = hash(x0 + 1, z0), c = hash(x0, z0 + 1), d = hash(x0 + 1, z0 + 1);
  return a + (b - a) * tx + (c - a) * tz + (a - b - c + d) * tx * tz;
}
function noise3(x, y, z, s) {
  const fx = x / s, fy = y / s, fz = z / s;
  const x0 = Math.floor(fx), y0 = Math.floor(fy), z0 = Math.floor(fz);
  const tx = sm(fx - x0), ty = sm(fy - y0), tz = sm(fz - z0);
  const c000 = hash3(x0, y0, z0),     c100 = hash3(x0+1, y0, z0);
  const c010 = hash3(x0, y0+1, z0),   c110 = hash3(x0+1, y0+1, z0);
  const c001 = hash3(x0, y0, z0+1),   c101 = hash3(x0+1, y0, z0+1);
  const c011 = hash3(x0, y0+1, z0+1), c111 = hash3(x0+1, y0+1, z0+1);
  const e = c000 + (c100 - c000) * tx, f = c010 + (c110 - c010) * tx;
  const g2 = c001 + (c101 - c001) * tx, h2 = c011 + (c111 - c011) * tx;
  const i = e + (f - e) * ty, j = g2 + (h2 - g2) * ty;
  return i + (j - i) * tz;
}
function columnHeight(x, z) {
  const mountain = Math.pow(noise(x + 300, z + 300, 64), 2.2) * 36;
  const hills = noise(x + 50, z + 50, 20) * 8;
  const detail = noise(x, z, 7) * 3;
  return Math.min(MAX_Y - 6, Math.floor(2 + mountain + hills + detail));
}
function forestness(x, z) { return noise(x + 900, z + 900, 34); }
function placeOakTree(x, h, z) {
  const trunkH = 4 + Math.floor(hash(x, z) * 2);
  for (let y = h + 1; y <= h + trunkH; y++) blocks.set(key(x, y, z), 6);
  const top = h + trunkH;
  for (let dx = -2; dx <= 2; dx++)
    for (let dz = -2; dz <= 2; dz++)
      for (let dy = -1; dy <= 2; dy++) {
        const dist = Math.abs(dx) + Math.abs(dz) + Math.abs(dy);
        if (dist <= 3 && !(dx === 0 && dz === 0 && dy <= 0)) {
          const k = key(x + dx, top + dy, z + dz);
          if (!blocks.has(k)) blocks.set(k, 7);
        }
      }
}
function placePineTree(x, h, z) {
  const trunkH = 6 + Math.floor(hash(x + 5, z + 9) * 3);
  for (let y = h + 1; y <= h + trunkH; y++) blocks.set(key(x, y, z), 6);
  for (let layer = 0; layer <= trunkH - 2; layer++) {
    const y = h + trunkH - layer;
    const r = Math.min(2, ((layer + 1) / 2) | 0);
    if (r === 0) continue;
    for (let dx = -r; dx <= r; dx++)
      for (let dz = -r; dz <= r; dz++) {
        if (Math.abs(dx) + Math.abs(dz) > r + (layer % 2)) continue;
        if (dx === 0 && dz === 0) continue;
        const k = key(x + dx, y, z + dz);
        if (!blocks.has(k)) blocks.set(k, 12);
      }
  }
  const k = key(x, h + trunkH + 1, z);
  if (!blocks.has(k)) blocks.set(k, 12);
}
function generateChunk(cx, cz) {
  const id = ckey(cx, cz);
  if (genChunks.has(id)) return;
  genChunks.add(id);
  const x0 = cx * CHUNK, z0 = cz * CHUNK;
  for (let x = x0; x < x0 + CHUNK; x++) {
    for (let z = z0; z < z0 + CHUNK; z++) {
      const h = columnHeight(x, z);
      for (let y = 0; y <= h; y++) {
        const k = key(x, y, z);
        if (blocks.has(k)) continue;
        if (y === 0) { blocks.set(k, 20); continue; }
        if (y < h - 1 && y < 26 && noise3(x, y * 1.6, z, 7) > 0.68) continue;
        let t;
        if (y === h) {
          if (h <= WATER_Y + 1)      t = 8;
          else if (h >= 30)          t = 11;
          else if (h >= 24)          t = 3;
          else                       t = 1;
        } else if (y >= h - 2) {
          if (h <= WATER_Y + 1)      t = 8;
          else if (h >= 24)          t = 3;
          else                       t = 2;
        } else {
          const r = hash3(x * 3 + 7, y * 5 + 1, z * 3 + 13);
          if      (r > 0.996 && y <= 5)  t = 24;
          else if (r > 0.992 && y <= 8)  t = 23;
          else if (r > 0.982 && y <= 12) t = 22;
          else if (r > 0.962)            t = 21;
          else                           t = 3;
        }
        blocks.set(k, t);
      }
      if (h > WATER_Y + 1 && h < 28) {
        const f = forestness(x, z);
        const density = f > 0.62 ? 0.075 : f > 0.5 ? 0.02 : 0.004;
        if (hash(x * 7 + 3, z * 13 + 5) < density) {
          if (h >= 16 || hash(x + 11, z + 17) < 0.25) placePineTree(x, h, z);
          else placeOakTree(x, h, z);
        }
      }
    }
  }
}

const ROTATABLE = new Set([2, 3, 4, 7, 8, 12, 14, 21, 22, 23, 24]);
function rebuildChunk(cx, cz) {
  const id = ckey(cx, cz);
  (chunkMeshes.get(id) || []).forEach(m => { scene.remove(m); m.dispose(); meshPos.delete(m); });
  const groups = {};
  const x0 = cx * CHUNK, z0 = cz * CHUNK;
  for (let x = x0; x < x0 + CHUNK; x++)
    for (let z = z0; z < z0 + CHUNK; z++)
      for (let y = 0; y <= MAX_Y; y++) {
        const t = blocks.get(key(x, y, z));
        if (t === undefined) continue;
        let exposed = false;
        for (const [dx, dy, dz] of NEIGHBORS) {
          const nb = blocks.get(key(x + dx, y + dy, z + dz));
          if (nb === undefined || TYPES[nb].transparent) { exposed = true; break; }
        }
        if (!exposed) continue;
        (groups[t] || (groups[t] = [])).push([x, y, z]);
      }
  const m4 = new THREE.Matrix4();
  const list = [];
  for (const t in groups) {
    const ps = groups[t];
    const im = new THREE.InstancedMesh(boxGeo, TYPES[t].mats, ps.length);
    const canRot = ROTATABLE.has(+t);
    ps.forEach((p, i) => {
      const rot = canRot ? ((hash3(p[0], p[1], p[2]) * 4) | 0) * Math.PI / 2 : 0;
      p[3] = rot;
      m4.makeRotationY(rot).setPosition(p[0], p[1], p[2]);
      im.setMatrixAt(i, m4);
    });
    im.userData.type = +t;
    if (TYPES[t].transparent) im.renderOrder = 1;
    scene.add(im); list.push(im); meshPos.set(im, ps);
  }
  chunkMeshes.set(id, list);
}

let mobSpawnT = 0;
function updateMobs(dt, daylight) {
  const p = player.pos;
  mobSpawnT -= dt;
  if (mobSpawnT <= 0) {
    mobSpawnT = 3;
    const animals = mobs.filter(m => m.kind !== "zombie").length;
    const zombies = mobs.filter(m => m.kind === "zombie").length;
    const ang = rnd(0, Math.PI * 2), dist = rnd(16, 30);
    const sx = Math.floor(p.x + Math.cos(ang) * dist), sz = Math.floor(p.z + Math.sin(ang) * dist);
    if (daylight > 0.3 && animals < 8) spawnMob(Math.random() < 0.5 ? "pig" : "sheep", sx, sz);
    else if (daylight < 0.12 && zombies < 5) spawnMob("zombie", sx, sz);
  }
  for (let i = mobs.length - 1; i >= 0; i--) {
    const m = mobs[i];
    m.phase += dt;
    const distP = m.pos.distanceTo(p);
    if (distP > 70) { scene.remove(m.group); mobs.splice(i, 1); continue; }
    if (m.kind === "zombie" && daylight > 0.2) {
      m.hp -= dt * 1.5;
      if (Math.random() < dt * 6) colorParticles(m.pos.x, m.pos.y + 1.5, m.pos.z, 0xff8830, 2);
      if (m.hp <= 0) { killMob(m, i); continue; }
    }
    let moveSpd = 0;
    if (m.kind === "zombie" && distP < 20 && !dead) {
      m.yaw = Math.atan2(p.x - m.pos.x, p.z - m.pos.z);
      moveSpd = m.speed;
      if (Math.random() < dt * 0.25) blip(rnd(60, 85), 0.35, "sawtooth", 0.05);
      const dx = p.x - m.pos.x, dz = p.z - m.pos.z;
      if (m.hitCd <= 0 && dx * dx + dz * dz < 1.5 && Math.abs(p.y - m.pos.y) < 2) {
        m.hitCd = 0.9;
        damagePlayer(2);
        player.vel.x += dx * 4; player.vel.z += dz * 4; player.vel.y = 4;
      }
    } else {
      m.wanderT -= dt;
      if (m.wanderT <= 0) {
        m.wanderT = rnd(1.5, 4);
        m.moving = Math.random() < 0.6;
        m.yaw = rnd(0, Math.PI * 2);
      }
      if (m.moving) moveSpd = m.speed;
    }
    m.hitCd = Math.max(0, m.hitCd - dt);
    m.vel.x = Math.sin(m.yaw) * moveSpd;
    m.vel.z = Math.cos(m.yaw) * moveSpd;
    m.vel.y -= 26 * dt;
    let blocked = false;
    m.pos.x += m.vel.x * dt;
    if (boxCollides(m.pos.x, m.pos.y, m.pos.z, m.hw, m.H)) { m.pos.x -= m.vel.x * dt; blocked = true; }
    m.pos.z += m.vel.z * dt;
    if (boxCollides(m.pos.x, m.pos.y, m.pos.z, m.hw, m.H)) { m.pos.z -= m.vel.z * dt; blocked = true; }
    m.pos.y += m.vel.y * dt;
    m.onGround = false;
    if (boxCollides(m.pos.x, m.pos.y, m.pos.z, m.hw, m.H)) {
      if (m.vel.y < 0) m.onGround = true;
      m.pos.y -= m.vel.y * dt;
      m.vel.y = 0;
    }
    if (blocked && m.onGround) m.vel.y = 7.5;
    if (m.pos.y < -10) { scene.remove(m.group); mobs.splice(i, 1); continue; }
    m.group.position.copy(m.pos);
    m.group.rotation.y = m.yaw;
    const sw = moveSpd > 0 ? Math.sin(m.phase * 8) * 0.55 : 0;
    m.legs.forEach((l, li) => l.rotation.x = li % 2 ? sw : -sw);
    m.flash = Math.max(0, m.flash - dt);
    m.mats.forEach(mt => mt.emissive.setHex(m.flash > 0 ? 0x991111 : 0x000000));
  }
}

const raycaster = new THREE.Raycaster();
raycaster.far = 6;
function pick() {
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const targets = allBlockMeshes().concat([...torches.values()]);
  const hits = raycaster.intersectObjects(targets, true);
  if (!hits.length) return null;
  const h = hits[0];
  let o = h.object;
  while (o && !o.isInstancedMesh && !o.userData.torchKey) o = o.parent;
  if (!o) return null;
  if (o.userData.torchKey) return { torchKey: o.userData.torchKey };
  const pp = meshPos.get(o)[h.instanceId];
  const n = h.face.normal.clone();
  if (pp[3]) n.applyAxisAngle(UP_AXIS, pp[3]).round(); // 回転ブロックの法線を戻す
  return { pos: pp, normal: n, type: o.userData.type };
}
const UP_AXIS = new THREE.Vector3(0, 1, 0);
function pickMob() {
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const hits = raycaster.intersectObjects(mobs.map(m => m.group), true);
  if (!hits.length || hits[0].distance > 3.6) return null;
  let o = hits[0].object;
  while (o && !mobs.some(m => m.group === o)) o = o.parent;
  return mobs.find(m => m.group === o) || null;
}

function breakBlockAt(x, y, z, t) {
  blocks.delete(key(x, y, z));
  spawnParticles(x - 0.5, y - 0.5, z - 0.5, t);
  if (!creative) {
    const req = MINERAL[t] || 0;
    if (req <= bestPick()) {
      const d = dropFor(t);
      if (d) spawnDropEntity(x - 0.5, y - 0.5, z - 0.5, d);
      blip(rnd(80, 110), 0.1, "square");
    } else {
      blip(65, 0.15, "sawtooth", 0.08);
    }
  } else blip(rnd(80, 110), 0.1, "square");
  rebuildAround(x, z);
}

addEventListener("mousedown", e => {
  if (!locked || dead || craftOpen) return;
  swingT = 0.25;
  if (e.button === 0) {
    leftDown = true;
    const mob = pickMob();
    if (mob) {
      mob.hp -= bestSword();
      mob.flash = 0.18;
      const dx = mob.pos.x - player.pos.x, dz = mob.pos.z - player.pos.z;
      const dl = Math.hypot(dx, dz) || 1;
      mob.vel.x += dx / dl * 6; mob.vel.z += dz / dl * 6; mob.vel.y = 4.5;
      blip(300, 0.06, "square", 0.1);
      if (mob.hp <= 0) killMob(mob, mobs.indexOf(mob));
      return;
    }
    const hit = pick();
    if (!hit) return;
    if (hit.torchKey) {
      const [x, y, z] = hit.torchKey.split(",").map(Number);
      removeTorch(hit.torchKey);
      if (!creative) spawnDropEntity(x - 0.5, y - 0.5, z - 0.5, { id: 13, n: 1 });
      blip(240, 0.06, "square");
      return;
    }
    if (TYPES[hit.type].unbreakable) { blip(60, 0.15, "sawtooth", 0.08); return; }
    if (creative) breakBlockAt(hit.pos[0], hit.pos[1], hit.pos[2], hit.type);
    else mining = { x: hit.pos[0], y: hit.pos[1], z: hit.pos[2], type: hit.type, progress: 0 };
  } else if (e.button === 2) {
    const id = HOTBAR_IDS[selected];
    if (ITEMS[id] && ITEMS[id].food) {
      if ((inv[id] || 0) < 1 && !creative) { blip(120, 0.1, "sawtooth", 0.07); return; }
      if (hunger >= 20) { blip(200, 0.08, "sine", 0.05); return; }
      if (!creative) { inv[id]--; refreshCounts(); }
      hunger = Math.min(20, hunger + ITEMS[id].food);
      refreshHunger();
      blip(rnd(140, 170), 0.09, "triangle", 0.1);
      setTimeout(() => blip(rnd(120, 150), 0.09, "triangle", 0.09), 120);
      setTimeout(() => blip(rnd(100, 130), 0.11, "triangle", 0.08), 260);
      colorParticles(player.pos.x, player.pos.y + 1.3, player.pos.z, ITEMS[id].color, 5);
      return;
    }
    const hit = pick();
    if (!hit || hit.torchKey) return;
    const [x, y, z] = hit.pos;
    const nx = x + hit.normal.x, ny = y + hit.normal.y, nz = z + hit.normal.z;
    if (!creative && (inv[id] || 0) < 1) { blip(120, 0.1, "sawtooth", 0.07); return; }
    if (blocks.has(key(nx, ny, nz)) || torches.has(key(nx, ny, nz))) return;
    if (TYPES[id] && TYPES[id].torch) {
      placeTorchBlock(nx, ny, nz);
      if (!creative) { inv[id]--; refreshCounts(); }
      blip(rnd(300, 360), 0.06, "triangle");
      return;
    }
    if (!TYPES[id] || !TYPES[id].mats) return;
    const p = player.pos;
    const overlap =
      nx + 1 > p.x - player.W && nx < p.x + player.W &&
      nz + 1 > p.z - player.W && nz < p.z + player.W &&
      ny + 1 > p.y && ny < p.y + player.H;
    if (!overlap) {
      blocks.set(key(nx, ny, nz), id);
      if (!creative) { inv[id]--; refreshCounts(); }
      blip(rnd(200, 260), 0.07, "square");
      rebuildAround(nx, nz);
    }
  }
});

function updateMining(dt) {
  crackMesh.visible = false;
  if (creative || !leftDown || dead || craftOpen) { mining = null; return; }
  const hit = pick();
  if (!hit || hit.torchKey) { mining = null; return; }
  const [x, y, z] = hit.pos;
  if (TYPES[hit.type].unbreakable) { mining = null; return; }
  if (!mining || mining.x !== x || mining.y !== y || mining.z !== z) {
    mining = { x, y, z, type: hit.type, progress: 0 };
  }
  const mult = MINERAL[mining.type] ? PICK_SPEED[bestPick()] : 1;
  mining.progress += dt * mult;
  if (swingT <= 0) swingT = 0.22;
  if (Math.random() < dt * 8) blip(rnd(140, 180), 0.03, "square", 0.05);
  const hard = HARDNESS[mining.type] || 1;
  if (mining.progress >= hard) {
    breakBlockAt(x, y, z, mining.type);
    mining = null;
    return;
  }
  const stage = Math.min(3, Math.floor(mining.progress / hard * 4));
  crackMat.map = crackTexs[stage];
  crackMesh.position.set(x, y, z);
  crackMesh.visible = true;
}

================================================================ */
const DAY_LEN = 180;
let dayTime = DAY_LEN * 0.25;
let daylight = 1;
const skyDay = new THREE.Color(0x8fc7ee), skyNight = new THREE.Color(0x0a1026);
const skySunset = new THREE.Color(0xe8905a);
const tmpColor = new THREE.Color();
function updateDayNight(dt) {
  dayTime = (dayTime + dt) % DAY_LEN;
  const ang = (dayTime / DAY_LEN) * Math.PI * 2 - Math.PI / 2;
  const dir = new THREE.Vector3(Math.cos(ang), Math.sin(ang), 0.3).normalize();
  sun.position.copy(dir).multiplyScalar(80);
  daylight = Math.max(0, Math.sin(ang));
  const dusk = Math.max(0, 1 - Math.abs(Math.sin(ang)) * 4);
  tmpColor.copy(skyNight).lerp(skyDay, sm(Math.min(1, daylight * 1.6)));
  if (dusk > 0 && daylight < 0.4) tmpColor.lerp(skySunset, dusk * 0.55);
  scene.background.copy(tmpColor);
  scene.fog.color.copy(tmpColor);
  sun.intensity = 0.1 + daylight * 0.9;
  ambient.intensity = 0.16 + daylight * 0.42;
  cloudMat.opacity = 0.2 + daylight * 0.55;
  sunMesh.position.copy(camera.position).addScaledVector(dir, 220);
  sunMesh.lookAt(camera.position);
  moonMesh.position.copy(camera.position).addScaledVector(dir, -220);
  moonMesh.lookAt(camera.position);
  stars.position.copy(camera.position);
  stars.rotation.z = ang * 0.3;
  starMat.opacity = Math.max(0, 1 - daylight * 3);
}

/* ================================================================
   14. メインループ
================================================================ */
const hud = document.getElementById("hud");
const waterOverlayEl = document.getElementById("waterOverlay");
const dmgFlashEl = document.getElementById("dmgFlash");
const clock = new THREE.Clock();

function update(dt) {
  const p = player.pos;
  const inWater = isWaterAt(p.x, p.y + 0.4, p.z);
  const headUnder = isWaterAt(p.x, p.y + player.EYE, p.z);
  const sprint = (keys["ShiftLeft"] || keys["ShiftRight"]) && !player.flying && !inWater && hunger > 3;
  const speed = player.flying ? 12 : inWater ? 2.6 : sprint ? 7.5 : 4.4;

  let mx = 0, mz = 0;
  if (!craftOpen) {
    if (keys["KeyW"]) mz -= 1;
    if (keys["KeyS"]) mz += 1;
    if (keys["KeyA"]) mx -= 1;
    if (keys["KeyD"]) mx += 1;
  }
  const len = Math.hypot(mx, mz) || 1;
  mx /= len; mz /= len;
  const sin = Math.sin(player.yaw), cos = Math.cos(player.yaw);
  player.vel.x = (mx * cos + mz * sin) * speed;
  player.vel.z = (-mx * sin + mz * cos) * speed;

  if (player.flying) {
    player.vel.y = 0;
    if (keys["Space"]) player.vel.y = 9;
    if (keys["ShiftLeft"] || keys["ShiftRight"]) player.vel.y = -9;
    fallDist = 0;
  } else if (inWater) {
    player.vel.y -= 5 * dt;
    player.vel.y = Math.max(player.vel.y, -2.2);
    if (keys["Space"]) player.vel.y = Math.min(player.vel.y + 24 * dt, 3.5);
    fallDist = 0;
  } else {
    player.vel.y -= 26 * dt;
    if (keys["Space"] && player.onGround && !craftOpen) {
      player.vel.y = 8.4;
      hungerAcc += 0.03;
      blip(180, 0.05, "sine", 0.05);
    }
    if (player.vel.y < 0) fallDist += -player.vel.y * dt;
  }

  const wasInWater = player._wasInWater;
  if (inWater && !wasInWater) { blip(500, 0.14, "triangle", 0.1); colorParticles(p.x, WATER_Y + 0.4, p.z, 0xbfe4ff, 8); }
  player._wasInWater = inWater;

  p.x += player.vel.x * dt;
  if (boxCollides(p.x, p.y, p.z, player.W, player.H)) { p.x -= player.vel.x * dt; player.vel.x = 0; }
  p.z += player.vel.z * dt;
  if (boxCollides(p.x, p.y, p.z, player.W, player.H)) { p.z -= player.vel.z * dt; player.vel.z = 0; }
  p.y += player.vel.y * dt;
  player.onGround = false;
  if (boxCollides(p.x, p.y, p.z, player.W, player.H)) {
    if (player.vel.y < 0) {
      player.onGround = true;
      if (fallDist > 3.5) damagePlayer(Math.floor(fallDist - 3));
      fallDist = 0;
    }
    p.y -= player.vel.y * dt;
    player.vel.y = 0;
  }
  if (p.y < -20) { damagePlayer(100); spawnPlayer(); }

  const moving = (mx !== 0 || mz !== 0) && player.onGround;
  if (moving) {
    stepAcc += speed * dt;
    if (stepAcc > 2.4) { stepAcc = 0; footstep(); }
  }

  if (!creative) {
    if (headUnder) {
      air -= dt / 1.4;
      if (air <= 0) { air = 0; if (invulnT <= 0) damagePlayer(2); }
    } else air = Math.min(10, air + dt * 4);
  }
  refreshBubbles(headUnder);

  if (!creative) {
    hungerAcc += dt / 30;
    if (sprint && moving) hungerAcc += dt / 9;
    if (hungerAcc >= 1) {
      hungerAcc -= 1;
      if (hunger > 0) { hunger--; refreshHunger(); }
    }
    if (hunger <= 0) {
      starveT += dt;
      if (starveT > 4) { starveT = 0; if (hp > 1) { hp--; flashT = 0.25; blip(110, 0.15, "sawtooth", 0.1); refreshHearts(); } }
    }
    if (hunger >= 16 && hp < 20 && performance.now() - lastDmg > 5000) {
      regenTimer += dt;
      if (regenTimer > 2.5) { regenTimer = 0; hp = Math.min(20, hp + 1); refreshHearts(); }
    }
  }
  invulnT = Math.max(0, invulnT - dt);

  if (moving) bobPhase += dt * (sprint ? 11 : 8);
  const camBob = moving && !thirdPerson ? Math.sin(bobPhase * 2) * 0.045 : 0;
  const eyeX = p.x, eyeY = p.y + player.EYE + camBob, eyeZ = p.z;
  camera.rotation.order = "YXZ";
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;
  if (thirdPerson) {
    const fx = -Math.sin(player.yaw) * Math.cos(player.pitch);
    const fy = Math.sin(player.pitch);
    const fz = -Math.cos(player.yaw) * Math.cos(player.pitch);
    let dist = 0.5;
    for (let t = 0.5; t <= 4.2; t += 0.25) {
      const cx = eyeX - fx * t, cy = eyeY - fy * t, cz = eyeZ - fz * t;
      if (blocks.has(key(Math.floor(cx), Math.floor(cy), Math.floor(cz)))) break;
      dist = t;
    }
    camera.position.set(eyeX - fx * dist, eyeY - fy * dist, eyeZ - fz * dist);
    playerModel.visible = true;
    handGroup.visible = false;
    playerModel.position.set(p.x, p.y, p.z);
    playerModel.rotation.y = player.yaw + Math.PI;
    const sw = moving ? Math.sin(bobPhase * 2) * 0.55 : 0;
    pLegs.forEach((l, li) => l.rotation.x = li % 2 ? sw : -sw);
    pArms.forEach((a, ai) => a.rotation.x = ai % 2 ? -sw : sw);
  } else {
    camera.position.set(eyeX, eyeY, eyeZ);
    playerModel.visible = false;
    handGroup.visible = true;
  }
  const targetFov = sprint || player.flying ? 84 : 75;
  camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 8);
  camera.updateProjectionMatrix();

  waterOverlayEl.style.display = headUnder ? "block" : "none";
  if (headUnder) {
    scene.fog.near = 3; scene.fog.far = 24;
    scene.fog.color.setHex(0x1a4a90);
    scene.background.setHex(0x1a4a90);
  } else {
    scene.fog.near = FOG_NEAR; scene.fog.far = FOG_FAR;
  }

  const handBobY = moving ? Math.sin(bobPhase * 2) * 0.02 : Math.sin(performance.now() / 900) * 0.006;
  const handBobX = moving ? Math.cos(bobPhase) * 0.018 : 0;
  handGroup.position.set(0.42 + handBobX, -0.42 + handBobY, -0.62);
  if (swingT > 0) {
    swingT -= dt;
    const pr = 1 - Math.max(0, swingT) / 0.25;
    const s = Math.sin(pr * Math.PI);
    handGroup.rotation.set(-0.15 - s * 0.9, 0.35 - s * 0.35, 0);
    handGroup.position.z = -0.62 - s * 0.12;
  } else {
    handGroup.rotation.set(-0.15, 0.35, 0);
  }

  updateMining(dt);
  const hit = locked && !craftOpen ? pick() : null;
  highlight.visible = !!(hit && !hit.torchKey);
  if (hit && hit.pos) highlight.position.set(hit.pos[0], hit.pos[1], hit.pos[2]);

  water.position.x = p.x; water.position.z = p.z;
  cloudGroup.position.x = Math.floor(p.x / 40) * 40;
  cloudGroup.position.z = Math.floor(p.z / 40) * 40;
  cloudGroup.children.forEach(c => {
    c.position.x += dt * 0.8;
    if (c.position.x > 100) c.position.x = -100;
  });
  ensureChunks(p.x, p.z);
  updateTorchLights(performance.now() / 1000);
  updateMobs(dt, daylight);
  updateDrops(dt);
  updateParticles(dt);
  updateDayNight(dt);

  flashT = Math.max(0, flashT - dt);
  dmgFlashEl.style.opacity = flashT > 0 ? (flashT / 0.35) : 0;

  const hh = Math.floor(dayTime / DAY_LEN * 24), mm = Math.floor((dayTime / DAY_LEN * 24 % 1) * 60);
  const pickNames = { 0: "素手", 1: "木", 2: "石", 3: "鉄", 4: "ダイヤ" };
  hud.innerHTML =
    `[${creative ? "クリエイティブ" : "サバイバル"}] X:${p.x.toFixed(0)} Y:${p.y.toFixed(0)} Z:${p.z.toFixed(0)}` +
    ` | ${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}` +
    (player.flying ? ` | <b>飛行中</b>` : "") +
    `<br>装備 ピッケル:${pickNames[bestPick()]} 剣:攻撃力${bestSword()}` +
    ` | 素材 原木:${inv[6] || 0} 板材:${inv[5] || 0} 棒:${inv[31] || 0} 石炭:${inv[30] || 0} 鉄:${inv[22] || 0} 金:${inv[23] || 0} ダイヤ:${inv[24] || 0}` +
    (daylight < 0.12 && !creative ? `<br><b style="color:#f88">夜: ゾンビ出現中!</b>` : "");
}

function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (locked && !dead && !craftOpen) update(dt);
  renderer.render(scene, camera);
}

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ================================================================
   起動
================================================================ */
for (let cx = -1; cx <= 1; cx++)
  for (let cz = -1; cz <= 1; cz++) {
    generateChunk(cx, cz);
    rebuildChunk(cx, cz);
  }
buildHotbar();
updateHeldBlock();
spawnPlayer();
refreshHearts(); refreshHunger();
for (let i = 0; i < 4; i++) {
  spawnMob(Math.random() < 0.5 ? "pig" : "sheep",
    Math.floor(rnd(-12, 12)), Math.floor(rnd(-12, 12)));
}
camera.position.copy(player.pos).y += player.EYE;
updateDayNight(0);
loop();
</script>
</body>
</html>
